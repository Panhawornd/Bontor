name: CodeRabbit Review

# Note: CodeRabbit primarily works via GitHub App installation
# This workflow is optional and provides additional automation
# Main integration happens via GitHub App: https://github.com/apps/coderabbitai

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  coderabbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CodeRabbit GitHub App handles reviews automatically
      # This workflow ensures the repository is ready for review
      - name: Verify repository structure
        run: |
          echo "Repository ready for CodeRabbit review"
          echo "Ensure CodeRabbit GitHub App is installed: https://github.com/apps/coderabbitai"

