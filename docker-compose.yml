version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: grade_analyzer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: baboo123
      POSTGRES_DB: grade_analyzer
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grade_analyzer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "baboo123"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
